<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>达达商城::用户激活</title>
	<style type="text/css">
		html,body,p,div,h1,h2,h3,h4,h5,h6,ul,ol,li,table,tr,td,th,thead,tbody,tfoot,form,input,select{
			margin: 0;
			padding: 0;
		}
		ul,ol{
			list-style:none;
		}
		table{
			border-collapse: collapse;
			border-spacing: 0;
		}
		a{
			text-decoration: none;
			color:#900;
		}
		img{
			border:none;
		}
		body{
			font-size:16px;
			line-height: 2em;
		}
		#container{
			margin:0 5px;
		}
		#heading{
			font-size: 24px;
			line-height: 36px;
		}
		.span{
			display: inline-block;
			padding: 0 5px;
			color: #900;
		}
	</style>
</head>
<body>
	<div id="container">
		<h1 id="heading">达达商城::用户激活</h1>
		<p>尊敬的<span class="span">{{ username }}</span>用户您好：</p>
		<p>恭喜您成为达达商城的正式会员，您将享受以下权利:</p>
		<p>1........</p>
		<p>2........</p>
		<p>3........</p>
		<p>4........</p>
		<p>请单击以下链接完成用户激活</p>
		<p><a href="http://localhost:7000/dadashop/templates/users/active.html?username={{username}}&code={{code}}" target="_blank">http://localhost:7000/dadashop/templates/active.html?username={{username}}&code={{code}}</a></p>
		<p>....</p>
		<p>....</p>
		<p>....</p>
	</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>达达商城::用户激活</title>
	<style type="text/css">
		html,body,p,div,h1,h2,h3,h4,h5,h6,ul,ol,li,table,tr,td,th,thead,tbody,tfoot,form,input,select{
			margin: 0;
			padding: 0;
		}
		ul,ol{
			list-style:none;
		}
		table{
			border-collapse: collapse;
			border-spacing: 0;
		}
		a{
			text-decoration: none;
			color:#900;
		}
		img{
			border:none;
		}
		body{
			font-size:16px;
			line-height: 2em;
		}
		#container{
			margin:0 5px;
		}
		#heading{
			font-size: 24px;
			line-height: 36px;
		}
		.span{
			display: inline-block;
			padding: 0 5px;
			color: #900;
		}
	</style>
</head>
<body>
	<div id="container">
		<h1 id="heading">达达商城::找回密码</h1>
		<p>尊敬的用户您好：</p>
		<p>您本次的验证码是：{{ verify }}</p>
		<p>........</p>
		<p>........</p>
		<p>本验证码{{ minutes }}分钟内有效</p>
		<p>....</p>
		<p>如果这不是您的邮件，请忽略。</p>
		<p>....</p>
	</div>
</body>
</html>
